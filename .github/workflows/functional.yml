name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "42 13 * * *"

permissions:
  contents: read

concurrency:
  group: functional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: uber
          POSTGRES_PASSWORD: uber
          POSTGRES_DB: uber_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://uber:uber@localhost:5432/uber_test
      - name: Run functional tests
        run: pytest tests/functional/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://uber:uber@localhost:5432/uber_test
          REDIS_URL: redis://localhost:6379/0
