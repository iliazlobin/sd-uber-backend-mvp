name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"  # daily at 09:00 UTC

jobs:
  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uber_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uber_test
        run: alembic upgrade head
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uber_test
          REDIS_URL: redis://localhost:6379/0
          HOST: 0.0.0.0
          PORT: 8000
          LOG_LEVEL: info
        run: pytest tests/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start stack
        run: docker compose up --build -d
      - name: Wait for healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8020/healthz; then
              echo "Stack healthy"
              exit 0
            fi
            echo "Waiting for health... ($i/30)"
            sleep 2
          done
          echo "Timed out waiting for /healthz"
          docker compose logs
          exit 1
      - name: Install test deps
        run: pip install httpx pytest
      - name: Run acceptance tests
        env:
          API_BASE_URL: http://localhost:8020
        run: pytest verify/acceptance/ -v
      - name: Tear down
        if: always()
        run: docker compose down -v
